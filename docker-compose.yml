version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: pitaya_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pitaya_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: pitaya_api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "mysql://root:root@mysql:3306/pitaya_db"
    depends_on:
      - mysql

  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
    container_name: pitaya_dashboard
    ports:
      - "5173:5173"

  nginx:
    image: nginx:latest
    container_name: pitaya_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - api
      - dashboard

volumes:
  mysql_data:
